  - name: Cost (Estimate)
    features:
      - name: Monthly cost ($USD) estimate for agentic coding (used to the best of the tools limitations)
        claude_code: $100-$200
        cline: $1200-$2200
        cline_highlight: 4
        opencode: $1200-$2200
        opencode_highlight: 4
