tools:
  - id: claude_code
    name: Claude Code
    header_highlight: 0
  - id: cline
    name: Cline
    header_highlight: 0
  - id: opencode
    name: OpenCode
    header_highlight: 0
  - id: openai_codex
    name: OpenAI Codex
    header_highlight: 3
  - id: github_copilot
    name: Github Copilot
    header_highlight: 4
  - id: google_antigravity
    name: Google Antigravity
    header_highlight: 3
  - id: cursor
    name: Cursor
    header_highlight: 4
  - id: amazon_kiro
    name: Amazon Kiro
    header_highlight: 4

# Optional: Define what each highlight level means for documentation
highlight_levels:
  0: Light blue - positive/meets requirements
  1: Requires enterprise/pro subscription
  2: Minor concern
  3: Moderate concern
  4: Significant concern
  5: Major concern

categories:
  - name: Functionality
    features:
      - name: Inference Providers & Model Selection
        claude_code:
          text: Any (works best with Anthropic models)
        cline: Any
        opencode: Any
        openai_codex: OpenAI models only, US based or BYO baseURL
        openai_codex_highlight: 3
        github_copilot: US based with limited context window, can BYO
        github_copilot_highlight: 3
        google_antigravity: US based Gemini models only
        google_antigravity_highlight: 3
        cursor: US based models, limited by plan, BYO option but limits features
        cursor_highlight: 3
        amazon_kiro: US based models
        amazon_kiro_highlight: 3

      - name: Sub-Agents
        claude_code: Yes
        cline: Yes
        opencode: Yes
        openai_codex: No
        openai_codex_highlight: 3
        github_copilot: No
        github_copilot_highlight: 3
        google_antigravity: Partial / very limited
        google_antigravity_highlight: 3
        cursor: Yes (limited)
        cursor_highlight: 2
        amazon_kiro: No
        amazon_kiro_highlight: 3

      - name: Custom Agents
        claude_code: Yes
        cline: Yes
        opencode: Yes
        openai_codex: No
        openai_codex_highlight: 2
        github_copilot: Yes
        google_antigravity: Yes
        cursor: No
        cursor_highlight: 2
        amazon_kiro: No
        amazon_kiro_highlight: 2

      - name: Prompt templates
        claude_code: Yes
        cline: Yes
        opencode: Yes
        openai_codex: No
        openai_codex_highlight: 3
        github_copilot: Yes
        google_antigravity: Partial
        google_antigravity_highlight: 2
        cursor: Yes
        amazon_kiro: No
        amazon_kiro_highlight: 3

      - name: Coding abilities
        claude_code: Best
        cline: Very good
        opencode: Good
        openai_codex: Good
        github_copilot: Lower end
        github_copilot_highlight: 4
        google_antigravity: Medium
        google_antigravity_highlight: 2
        cursor: Mid range
        cursor_highlight: 3
        amazon_kiro: Mid range
        amazon_kiro_highlight: 3

      - name: Speed
        claude_code: Fastest
        cline: Fastest
        opencode: Good
        openai_codex: Good
        github_copilot: Slow
        github_copilot_highlight: 4
        google_antigravity: Medium
        google_antigravity_highlight: 2
        cursor: Slow
        cursor_highlight: 4
        amazon_kiro: Slow
        amazon_kiro_highlight: 4

      - name: MCP Spec alignment
        claude_code: High
        cline: Medium/High
        opencode: Medium
        openai_codex: Medium/High
        github_copilot: High
        google_antigravity: Medium
        google_antigravity_highlight: 2
        cursor: Medium/Low
        cursor_highlight: 3
        amazon_kiro: Low
        amazon_kiro_highlight: 4

      - name: Full model capability
        claude_code: Full
        cline: Full
        opencode: Full
        openai_codex: Full
        github_copilot: Heavily Context Limited
        github_copilot_highlight: 4
        google_antigravity: Full
        cursor: Context Limited
        cursor_highlight: 3
        amazon_kiro: Context Limited
        amazon_kiro_highlight: 3

  - name: Operational management
    features:
      - name: Consumption budget controls
        claude_code: With Enterprise
        claude_code_highlight: 1
        cline: With Enterprise
        cline_highlight: 1
        opencode: No
        opencode_highlight: 3
        openai_codex:
          text: Partial (basic project/key limits)
          highlight: 2
        openai_codex_highlight: 2
        github_copilot: N/A
        google_antigravity: No
        google_antigravity_highlight: 3
        cursor: No (for BYO)
        cursor_highlight: 3
        amazon_kiro: N/A

  - name: Developer experience
    features:
      - name: User Interface
        claude_code: VSCode, IntelliJ IDE, TUI, Zed, CLI, CI/CD
        cline: VSCode IDE, IntelliJ, CLI
        opencode: TUI, CLI
        openai_codex: VSCode IDE, CLI
        github_copilot: VSCode, Zed, CLI
        google_antigravity: Standalone IDE (Fork of VSCode), CLI
        google_antigravity_highlight: 3
        cursor: Standalone IDE (Fork of VSCode), CLI
        cursor_highlight: 3
        amazon_kiro: Standalone IDE (Fork of VSCode), CLI
        amazon_kiro_highlight: 3

      - name: Source
        claude_code: Closed source
        claude_code_highlight: 5
        cline: Open source
        opencode: Open source
        openai_codex: Open source
        github_copilot: Open source
        google_antigravity: Closed source
        google_antigravity_highlight: 5
        cursor: Closed source
        cursor_highlight: 5
        amazon_kiro: Closed source
        amazon_kiro_highlight: 5

      - name: Babysitting required
        claude_code: Very Low
        cline: Low
        opencode: Medium/Low
        openai_codex: Medium/Low
        github_copilot: Very High
        github_copilot_highlight: 5
        google_antigravity: High
        google_antigravity_highlight: 4
        cursor: Very High
        cursor_highlight: 5
        amazon_kiro: Very High
        amazon_kiro_highlight: 5

      - name: Plan/Act modes
        claude_code: Yes
        cline: Yes
        opencode: Yes
        openai_codex: No
        openai_codex_highlight: 3
        github_copilot: Yes
        google_antigravity:
          text: Partial (doesn't work)
          highlight: 4
        google_antigravity_highlight: 4
        cursor: Yes
        amazon_kiro: No
        amazon_kiro_highlight: 5

      - name: Workflow flexibility
        claude_code: High
        cline: High
        opencode: High
        openai_codex: High
        github_copilot: Medium
        github_copilot_highlight: 2
        google_antigravity: Medium
        google_antigravity_highlight: 2
        cursor: Medium
        cursor_highlight: 2
        amazon_kiro: Very Low
        amazon_kiro_highlight: 4

      - name: Community size
        claude_code: Very Large
        cline: Large
        opencode: Medium
        opencode_highlight: 2
        openai_codex: Medium
        openai_codex_highlight: 2
        github_copilot: Large
        google_antigravity: Small
        google_antigravity_highlight: 4
        cursor: Large
        amazon_kiro: Small
        amazon_kiro_highlight: 4

  - name: Configuration management
    features:
      - name: File based configuration
        claude_code: Yes
        cline:
          text: No
          tooltip: Does have central web UI with enterprise / teams subscription
          highlight: 1
        cline_highlight: 1
        opencode: Yes
        openai_codex: Yes
        github_copilot: Partial
        github_copilot_highlight: 2
        google_antigravity: Limited
        google_antigravity_highlight: 3
        cursor: No
        cursor_highlight: 4
        amazon_kiro: Limited - no RBAC or rules
        amazon_kiro_highlight: 3

      - name: Per-project configuration (rules, MCP, RBAC)
        claude_code: Yes
        cline: In beta
        cline_highlight: 2
        opencode: Partial
        opencode_highlight: 2
        openai_codex: Partial
        openai_codex_highlight: 2
        github_copilot: Limited - no RBAC
        github_copilot_highlight: 2
        google_antigravity: Limited
        google_antigravity_highlight: 2
        cursor: No
        cursor_highlight: 3
        amazon_kiro: Limited - no RBAC
        amazon_kiro_highlight: 2

      - name: Centralised configuration
        claude_code:
          text: Partial (manual - split across config files)
          highlight: 2
        claude_code_highlight: 2
        cline: With enterprise / teams subscription
        cline_highlight: 1
        opencode: No
        opencode_highlight: 3
        openai_codex: No
        openai_codex_highlight: 3
        github_copilot: Partial
        github_copilot_highlight: 2
        google_antigravity: No
        google_antigravity_highlight: 3
        cursor: No (for BYO), Yes for US based
        cursor_highlight: 3
        amazon_kiro: No
        amazon_kiro_highlight: 3

  - name: Automation
    features:
      - name: Automation hooks
        claude_code: Yes
        cline: Yes
        opencode: Yes (Plugins)
        openai_codex: Yes
        github_copilot: No
        github_copilot_highlight: 3
        google_antigravity: No
        google_antigravity_highlight: 3
        cursor: No
        cursor_highlight: 3
        amazon_kiro: Yes

      - name: Headless / CLI / CI/CD mode
        claude_code: Yes
        cline: Yes
        opencode: Yes
        openai_codex: Yes
        github_copilot: Yes
        google_antigravity: Yes
        cursor: In beta
        cursor_highlight: 2
        amazon_kiro: No
        amazon_kiro_highlight: 3

      - name: Automated Context Cleanup
        claude_code: Yes
        cline: Yes
        opencode: Yes (Plugin)
        openai_codex: ""
        github_copilot: No
        github_copilot_highlight: 3
        google_antigravity: Yes
        cursor: No
        cursor_highlight: 3
        amazon_kiro: No
        amazon_kiro_highlight: 3

  - name: Access control
    features:
      - name: RBAC - Commands
        claude_code: Yes
        cline: Partial (basic)
        cline_highlight: 2
        opencode: Yes
        openai_codex: Partial
        openai_codex_highlight: 3
        github_copilot: No
        github_copilot_highlight: 5
        google_antigravity:
          text: No (has basic allow list - easy to bypass)
          highlight: 5
        google_antigravity_highlight: 5
        cursor:
          text: No (has basic allow list - easy to bypass)
          highlight: 5
          tooltip: "Easily bypassed https://www.backslash.security/blog/cursor-ai-security-flaw-autorun-denylist"
        cursor_highlight: 5
        amazon_kiro:
          text: No (has basic allow list - easy to bypass)
          highlight: 5
        amazon_kiro_highlight: 5

      - name: RBAC - Web domains
        claude_code: Yes
        cline: With enterprise / teams subscription
        cline_highlight: 1
        opencode: Yes
        openai_codex: No
        openai_codex_highlight: 3
        github_copilot: No
        github_copilot_highlight: 3
        google_antigravity: No
        google_antigravity_highlight: 3
        cursor: No
        cursor_highlight: 3
        amazon_kiro: No
        amazon_kiro_highlight: 3

      - name: RBAC - MCP tools
        claude_code: Yes
        cline: With enterprise / teams subscription
        cline_highlight: 1
        opencode: Yes
        openai_codex: No
        openai_codex_highlight: 4
        github_copilot: No
        github_copilot_highlight: 4
        google_antigravity: No
        google_antigravity_highlight: 4
        cursor: No
        cursor_highlight: 4
        amazon_kiro: No
        amazon_kiro_highlight: 4

      - name: SSO
        claude_code: Yes
        cline: With enterprise / teams subscription
        cline_highlight: 1
        opencode: N/A
        openai_codex: No
        openai_codex_highlight: 3
        github_copilot: Yes
        google_antigravity: Yes
        cursor: No (for BYO), Yes for US based
        cursor_highlight: 2
        amazon_kiro: Yes

