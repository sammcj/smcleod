# Skill / capability matrix rendered on /about/ via {{< skills-matrix >}}.
#
# Levels (1-5):
#   1 = Aware     - exposure, can read/contribute superficially
#   2 = Limited   - have used in anger but not deeply
#   3 = Senior   - day-to-day proficient, can ship unaided
#   4 = Lead    - lead delivery, mentor others, design decisions
#   5 = Principal      - recognised expert, set direction across teams
#
# Each skill: { name, level, note? (sub-line context), avoid? }
#
# Set `avoid: true` for skills you have but actively don't want to work on.
# These render with a hatched/muted bar instead of the progress style.
# `level` is ignored when `avoid: true` (still set it if you want it preserved).
#
# These ratings are starter placeholders - update to taste.

levels:
  - ★
  - ★★
  - ★★★
  - ★★★★
  - ★★★★★

# Label shown on `avoid: true` rows. Override here if you prefer e.g. "Pass" or "No thanks".
avoid_label: Avoid

categories:
  - name: AI & LLMs
    skills:
      - name: Agentic coding tooling & practices
        level: 5
        note: e.g. Claude Code / Cline / OpenCode, Workflows, Integrations
